<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Página Principal</title>
  <link rel="stylesheet" href="styles/style.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
</head>
<body class="principal">
  <header>
    <div id="user-profile">
      <span id="user-email"></span>
      <button onclick="logout()">Cerrar sesión</button>
    </div>
    <h1>Bienvenido a la Página Principal</h1>
  </header>

  <section id="buscador-section">
    <input type="text" id="buscador" placeholder="Buscar videos por usuario o título...">
    <button onclick="buscarVideos()">Buscar</button>
  </section>

  <!-- SECCIÓN PARA SUBIR VIDEO -->
  <section id="subir-video-section">
    <h2>Subir Video</h2>
    <input type="file" id="video-upload" accept="video/*">
    <input type="text" id="video-title" placeholder="Título del video">
    <button onclick="uploadVideo()">Subir</button>
    <p id="upload-msg"></p>
  </section>

  <section id="videos-section">
    <h2>Videos</h2>
    <div id="videos-list"></div>
  </section>

  <!-- Lista de amigos flotante mejorada -->
  <div id="amigos-section" style="display:none;">
    <h3>Mis amigos</h3>
    <ul id="amigos-list"></ul>
    <h4>Agregar amigo</h4>
    <input type="email" id="nuevo-amigo-email" placeholder="Correo del amigo">
    <button onclick="agregarAmigo()">Añadir</button>
    <h4>Bloqueados</h4>
    <ul id="bloqueados-list"></ul>
  </div>

  <!-- Botón flotante de amigos -->
  <button id="amigos-fab" onclick="toggleAmigos()" title="Ver amigos">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff">
      <path d="M12 12c2.7 0 8 1.34 8 4v2H4v-2c0-2.66 5.3-4 8-4zm0-2a4 4 0 1 0 0-8 4 4 0 0 0 0 8zm7.5 8c.83 0 1.5.67 1.5 1.5S20.33 21 19.5 21s-1.5-.67-1.5-1.5S18.67 18 19.5 18zm-15 0c.83 0 1.5.67 1.5 1.5S5.33 21 4.5 21 3 20.33 3 19.5 3.67 18 4.5 18z"/>
    </svg>
  </button>

  <!-- Botón flotante de chat -->
  <button id="chat-fab" onclick="toggleChat()" title="Abrir chat">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff">
      <path d="M20 2H4C2.897 2 2 2.897 2 4v14c0 1.103 0.897 2 2 2h14l4 4V4c0-1.103-0.897-2-2-2z"/>
    </svg>
  </button>

  <!-- Sección de chat oculta por defecto -->
  <section id="chat-section" style="display:none;">
    <h2>Chat</h2>
    <!-- Lista de chats frecuentados -->
    <div id="chats-section" style="margin-bottom:10px;">
      <h4>Mis chats</h4>
      <ul id="chats-list"></ul>
    </div>
    <div id="chat-messages" style="height:200px;overflow-y:auto;border:1px solid #ccc;margin-bottom:10px;background:#fafafa;padding:10px;border-radius:4px;"></div>
    <input type="text" id="chat-input" placeholder="Escribe tu mensaje...">
    <button onclick="sendMessage()">Enviar</button>
    <button onclick="toggleChat()">Cerrar chat</button>
  </section>

  <script>
    let chatUnsubscribe = null;
    let chatActual = null;

    // Mostrar email del usuario y actualizar estado online
    firebase.auth().onAuthStateChanged(function(user) {
      if (user) {
        document.getElementById('user-email').textContent = user.email;
        firebase.firestore().collection('users').doc(user.uid).set({
          email: user.email,
          online: true
        }, { merge: true });
        cargarAmigos();
        cargarBloqueados();
        cargarChats();
      } else {
        window.location.href = "index.html";
      }
    });

    // Buscar videos
    function buscarVideos() {
      const query = document.getElementById('buscador').value.toLowerCase();
      const videosList = document.getElementById('videos-list');
      videosList.innerHTML = "Buscando...";
      firebase.firestore().collection('videos').orderBy('createdAt', 'desc').get().then(snapshot => {
        videosList.innerHTML = '';
        snapshot.forEach(doc => {
          const data = doc.data();
          const titulo = data.titulo ? data.titulo.toLowerCase() : '';
          const email = data.userEmail ? data.userEmail.toLowerCase() : '';
          if (titulo.includes(query) || email.includes(query)) {
            const video = document.createElement('video');
            video.src = data.url;
            video.controls = true;
            video.style.width = "100%";
            videosList.appendChild(video);
            const info = document.createElement('div');
            info.textContent = `Subido por: ${data.userEmail} ${data.titulo ? ' | Título: ' + data.titulo : ''}`;
            videosList.appendChild(info);
          }
        });
        if (!videosList.hasChildNodes()) {
          videosList.innerHTML = "No se encontraron videos.";
        }
      });
    }

    // Subir video
    function uploadVideo() {
      const file = document.getElementById('video-upload').files[0];
      const title = document.getElementById('video-title').value;
      const uploadMsg = document.getElementById('upload-msg');
      const user = firebase.auth().currentUser;
      if (!file) {
        uploadMsg.textContent = "Selecciona un video.";
        return;
      }
      if (!title) {
        uploadMsg.textContent = "Ponle un título al video.";
        return;
      }
      const storageRef = firebase.storage().ref('videos/' + user.uid + '/' + Date.now() + '_' + file.name);
      uploadMsg.textContent = "Subiendo...";
      storageRef.put(file).then(snapshot => {
        snapshot.ref.getDownloadURL().then(url => {
          firebase.firestore().collection('videos').add({
            url,
            userId: user.uid,
            userEmail: user.email,
            titulo: title,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          uploadMsg.textContent = "¡Video subido!";
          document.getElementById('video-upload').value = "";
          document.getElementById('video-title').value = "";
          buscarVideos();
        });
      }).catch(e => uploadMsg.textContent = e.message);
    }

    // Cargar todos los videos al entrar
    buscarVideos();

    // Cerrar sesión y marcar offline
    function logout() {
      const user = firebase.auth().currentUser;
      if (user) {
        firebase.firestore().collection('users').doc(user.uid).set({
          online: false
        }, { merge: true }).then(() => {
          firebase.auth().signOut().then(() => {
            window.location.href = "index.html";
          });
        });
      }
    }

    // Mostrar/Ocultar chat
    function toggleChat() {
      const chatSection = document.getElementById('chat-section');
      if (chatSection.style.display === 'none' || !chatSection.style.display) {
        chatSection.style.display = 'block';
        cargarChats();
      } else {
        chatSection.style.display = 'none';
        if (chatUnsubscribe) chatUnsubscribe();
        chatActual = null;
      }
    }

    // Mostrar/Ocultar amigos
    function toggleAmigos() {
      const amigosSection = document.getElementById('amigos-section');
      if (amigosSection.style.display === 'none' || !amigosSection.style.display) {
        amigosSection.style.display = 'block';
        cargarAmigos();
        cargarBloqueados();
      } else {
        amigosSection.style.display = 'none';
      }
    }

    // Cargar lista de amigos
    function cargarAmigos() {
      const user = firebase.auth().currentUser;
      const amigosList = document.getElementById('amigos-list');
      amigosList.innerHTML = "Cargando...";
      firebase.firestore().collection('users').doc(user.uid).collection('amigos')
        .get()
        .then(snapshot => {
          amigosList.innerHTML = '';
          snapshot.forEach(doc => {
            const data = doc.data();
            const li = document.createElement('li');
            li.textContent = data.email;
            // Botón para bloquear
            const btnBlock = document.createElement('button');
            btnBlock.textContent = "Bloquear";
            btnBlock.style.marginLeft = "10px";
            btnBlock.onclick = () => bloquearAmigo(data.email);
            li.appendChild(btnBlock);
            amigosList.appendChild(li);
          });
          if (!amigosList.hasChildNodes()) {
            amigosList.innerHTML = "<li>No tienes amigos agregados.</li>";
          }
        });
    }

    // Agregar amigo por email
    function agregarAmigo() {
      const user = firebase.auth().currentUser;
      const email = document.getElementById('nuevo-amigo-email').value.trim().toLowerCase();
      if (!email || email === user.email) {
        alert("Ingresa un correo válido que no sea el tuyo.");
        return;
      }
      // Verifica si el usuario existe
      firebase.firestore().collection('users').where('email', '==', email).get().then(snapshot => {
        if (snapshot.empty) {
          alert("Usuario no encontrado.");
          return;
        }
        // Agrega a la subcolección de amigos
        firebase.firestore().collection('users').doc(user.uid).collection('amigos').doc(email).set({
          email: email
        }).then(() => {
          document.getElementById('nuevo-amigo-email').value = "";
          cargarAmigos();
          alert("¡Amigo agregado!");
        });
      });
    }

    // Bloquear amigo o usuario de chat
    function bloquearAmigo(email) {
      const user = firebase.auth().currentUser;
      // Elimina de amigos y agrega a bloqueados
      firebase.firestore().collection('users').doc(user.uid).collection('amigos').doc(email).delete().then(() => {
        firebase.firestore().collection('users').doc(user.uid).collection('bloqueados').doc(email).set({
          email: email
        }).then(() => {
          cargarAmigos();
          cargarBloqueados();
          alert("Usuario bloqueado.");
        });
      });
    }
    function bloquearUsuarioChat(email) {
      const user = firebase.auth().currentUser;
      firebase.firestore().collection('users').doc(user.uid).collection('bloqueados').doc(email).set({
        email: email
      }).then(() => {
        cargarBloqueados();
        alert("Usuario bloqueado.");
        cargarChats();
      });
    }

    // Cargar lista de bloqueados
    function cargarBloqueados() {
      const user = firebase.auth().currentUser;
      const bloqueadosList = document.getElementById('bloqueados-list');
      bloqueadosList.innerHTML = "Cargando...";
      firebase.firestore().collection('users').doc(user.uid).collection('bloqueados')
        .get()
        .then(snapshot => {
          bloqueadosList.innerHTML = '';
          snapshot.forEach(doc => {
            const data = doc.data();
            const li = document.createElement('li');
            li.textContent = data.email;
            bloqueadosList.appendChild(li);
          });
          if (!bloqueadosList.hasChildNodes()) {
            bloqueadosList.innerHTML = "<li>No tienes usuarios bloqueados.</li>";
          }
        });
    }

    // ----------- CHATS FRECUENTADOS Y MENSAJES -----------

    // Cargar lista de chats frecuentados (ordenados por cantidad de mensajes)
    function cargarChats() {
      const user = firebase.auth().currentUser;
      const chatsList = document.getElementById('chats-list');
      if (!chatsList) return;
      chatsList.innerHTML = "Cargando...";
      firebase.firestore().collection('chats')
        .where('participants', 'array-contains', user.email)
        .get()
        .then(async snapshot => {
          let chats = [];
          for (const doc of snapshot.docs) {
            const data = doc.data();
            const otros = data.participants.filter(e => e !== user.email);
            if (otros.length > 0) {
              const amigo = otros[0];
              // Contar mensajes
              const mensajesSnap = await firebase.firestore().collection('chats').doc(doc.id).collection('messages').get();
              chats.push({
                email: amigo,
                chatId: doc.id,
                mensajes: mensajesSnap.size
              });
            }
          }
          // Ordenar por cantidad de mensajes (más usado primero)
          chats.sort((a, b) => b.mensajes - a.mensajes);
          chatsList.innerHTML = '';
          chats.forEach(chat => {
            const li = document.createElement('li');
            li.style.display = "flex";
            li.style.alignItems = "center";
            // Nombre del amigo
            const span = document.createElement('span');
            span.textContent = `${chat.email} (${chat.mensajes} mensajes)`;
            span.style.flex = "1";
            span.style.cursor = "pointer";
            span.onclick = () => abrirChatCon(chat.email);
            li.appendChild(span);
            // Botón bloquear
            const btnBlock = document.createElement('button');
            btnBlock.textContent = "Bloquear";
            btnBlock.style.marginLeft = "10px";
            btnBlock.onclick = (e) => {
              e.stopPropagation();
              bloquearUsuarioChat(chat.email);
            };
            li.appendChild(btnBlock);
            chatsList.appendChild(li);
          });
          if (!chatsList.hasChildNodes()) {
            chatsList.innerHTML = "<li>No tienes chats aún.</li>";
          }
        });
    }

    // Abrir chat con un usuario y mostrar historial
    function abrirChatCon(email) {
      toggleChat();
      chatActual = email;
      cargarMensajes(email);
    }

    // Cargar mensajes del chat seleccionado
    function cargarMensajes(email) {
      const user = firebase.auth().currentUser;
      const chatId = [user.email, email].sort().join('_');
      const chatMessages = document.getElementById('chat-messages');
      if (chatUnsubscribe) chatUnsubscribe();
      chatUnsubscribe = firebase.firestore().collection('chats').doc(chatId)
        .collection('messages').orderBy('createdAt')
        .onSnapshot(snapshot => {
          chatMessages.innerHTML = '';
          snapshot.forEach(doc => {
            const data = doc.data();
            const div = document.createElement('div');
            div.textContent = `${data.sender}: ${data.message}`;
            chatMessages.appendChild(div);
          });
          chatMessages.scrollTop = chatMessages.scrollHeight;
        });
    }

    // Enviar mensaje al chat seleccionado
    function sendMessage() {
      const user = firebase.auth().currentUser;
      const input = document.getElementById('chat-input');
      const msg = input.value.trim();
      const email = chatActual;
      if (!msg || !email) return;
      const chatId = [user.email, email].sort().join('_');
      const chatRef = firebase.firestore().collection('chats').doc(chatId);
      // Asegura que el chat existe y agrega participantes
      chatRef.set({
        participants: [user.email, email]
      }, { merge: true }).then(() => {
        chatRef.collection('messages').add({
          sender: user.email,
          message: msg,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        input.value = '';
      });
    }
  </script>
</body>
</html>
