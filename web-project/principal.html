<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Página Principal</title>
  <link rel="stylesheet" href="styles/style.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
</head>
<body class="principal">
  <header>
    <div id="user-profile">
      <span id="user-email"></span>
      <button onclick="logout()">Cerrar sesión</button>
    </div>
    <h1>Bienvenido a la Página Principal</h1>
  </header>

  <section id="buscador-section">
    <input type="text" id="buscador" placeholder="Buscar videos por usuario o título...">
    <button onclick="buscarVideos()">Buscar</button>
  </section>

  <!-- SECCIÓN PARA SUBIR VIDEO -->
  <section id="subir-video-section">
    <h2>Subir Video</h2>
    <input type="file" id="video-upload" accept="video/*">
    <input type="text" id="video-title" placeholder="Título del video">
    <button onclick="uploadVideo()">Subir</button>
    <p id="upload-msg"></p>
  </section>

  <section id="videos-section">
    <h2>Videos</h2>
    <div id="videos-list"></div>
  </section>

  <!-- Botón flotante de chat -->
  <button id="chat-fab" onclick="toggleChat()" title="Abrir chat">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff">
      <path d="M20 2H4C2.897 2 2 2.897 2 4v14c0 1.103 0.897 2 2 2h14l4 4V4c0-1.103-0.897-2-2-2z"/>
    </svg>
  </button>

  <!-- Sección de chat oculta por defecto -->
  <section id="chat-section" style="display:none;">
    <h2>Chat</h2>
    <div id="chat-messages" style="height:200px;overflow-y:auto;border:1px solid #ccc;margin-bottom:10px;background:#fafafa;padding:10px;border-radius:4px;"></div>
    <input type="text" id="chat-input" placeholder="Escribe tu mensaje...">
    <button onclick="sendMessage()">Enviar</button>
    <button onclick="toggleChat()">Cerrar chat</button>
  </section>

  <script>
    // Mostrar email del usuario
    firebase.auth().onAuthStateChanged(function(user) {
      if (user) {
        document.getElementById('user-email').textContent = user.email;
      } else {
        window.location.href = "index.html";
      }
    });

    // Buscar videos
    function buscarVideos() {
      const query = document.getElementById('buscador').value.toLowerCase();
      const videosList = document.getElementById('videos-list');
      videosList.innerHTML = "Buscando...";
      firebase.firestore().collection('videos').orderBy('createdAt', 'desc').get().then(snapshot => {
        videosList.innerHTML = '';
        snapshot.forEach(doc => {
          const data = doc.data();
          const titulo = data.titulo ? data.titulo.toLowerCase() : '';
          const email = data.userEmail ? data.userEmail.toLowerCase() : '';
          if (titulo.includes(query) || email.includes(query)) {
            const video = document.createElement('video');
            video.src = data.url;
            video.controls = true;
            video.style.width = "100%";
            videosList.appendChild(video);
            const info = document.createElement('div');
            info.textContent = `Subido por: ${data.userEmail} ${data.titulo ? ' | Título: ' + data.titulo : ''}`;
            videosList.appendChild(info);
          }
        });
        if (!videosList.hasChildNodes()) {
          videosList.innerHTML = "No se encontraron videos.";
        }
      });
    }

    // Subir video
    function uploadVideo() {
      const file = document.getElementById('video-upload').files[0];
      const title = document.getElementById('video-title').value;
      const uploadMsg = document.getElementById('upload-msg');
      const user = firebase.auth().currentUser;
      if (!file) {
        uploadMsg.textContent = "Selecciona un video.";
        return;
      }
      if (!title) {
        uploadMsg.textContent = "Ponle un título al video.";
        return;
      }
      const storageRef = firebase.storage().ref('videos/' + user.uid + '/' + Date.now() + '_' + file.name);
      uploadMsg.textContent = "Subiendo...";
      storageRef.put(file).then(snapshot => {
        snapshot.ref.getDownloadURL().then(url => {
          firebase.firestore().collection('videos').add({
            url,
            userId: user.uid,
            userEmail: user.email,
            titulo: title,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          uploadMsg.textContent = "¡Video subido!";
          document.getElementById('video-upload').value = "";
          document.getElementById('video-title').value = "";
          buscarVideos();
        });
      }).catch(e => uploadMsg.textContent = e.message);
    }

    // Cargar todos los videos al entrar
    buscarVideos();

    // Cerrar sesión
    function logout() {
      firebase.auth().signOut().then(() => {
        window.location.href = "index.html";
      });
    }

    // Mostrar/Ocultar chat
    function toggleChat() {
      const chatSection = document.getElementById('chat-section');
      if (chatSection.style.display === 'none' || !chatSection.style.display) {
        chatSection.style.display = 'block';
      } else {
        chatSection.style.display = 'none';
      }
    }

    // Ejemplo de función para enviar mensaje
    function sendMessage() {
      alert("Funcionalidad de chat por implementar.");
    }
  </script>
</body>
</html>
